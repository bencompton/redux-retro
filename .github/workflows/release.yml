name: Test, Release & Publish

on:
  push:
    branches:
      - master

jobs:
  release:
    name: Test, Version, Tag & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

      - name: Read redux-retro version
        id: bump-redux-retro
        run: |
          NEW_VERSION=$(node -p "require('./packages/redux-retro/package.json').version")
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Read react-redux-retro version
        id: bump-react-redux-retro
        run: |
          NEW_VERSION=$(node -p "require('./packages/react-redux-retro/package.json').version")
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tags already exist
        id: check-tags
        run: |
          git fetch --tags
          if git rev-parse "redux-retro-${{ steps.bump-redux-retro.outputs.version }}" >/dev/null 2>&1; then
            echo "redux-retro-exists=true" >> $GITHUB_OUTPUT
          else
            echo "redux-retro-exists=false" >> $GITHUB_OUTPUT
          fi
          if git rev-parse "react-redux-retro-${{ steps.bump-react-redux-retro.outputs.version }}" >/dev/null 2>&1; then
            echo "react-redux-retro-exists=true" >> $GITHUB_OUTPUT
          else
            echo "react-redux-retro-exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push redux-retro tag
        if: steps.check-tags.outputs.redux-retro-exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "redux-retro-${{ steps.bump-redux-retro.outputs.version }}"
          git push origin "redux-retro-${{ steps.bump-redux-retro.outputs.version }}"

      - name: Create and push react-redux-retro tag
        if: steps.check-tags.outputs.react-redux-retro-exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "react-redux-retro-${{ steps.bump-react-redux-retro.outputs.version }}"
          git push origin "react-redux-retro-${{ steps.bump-react-redux-retro.outputs.version }}"

      - name: Create redux-retro GitHub release
        if: steps.check-tags.outputs.redux-retro-exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: redux-retro-${{ steps.bump-redux-retro.outputs.version }}
          name: redux-retro ${{ steps.bump-redux-retro.outputs.version }}
          generate_release_notes: true

      - name: Create react-redux-retro GitHub release
        if: steps.check-tags.outputs.react-redux-retro-exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: react-redux-retro-${{ steps.bump-react-redux-retro.outputs.version }}
          name: react-redux-retro ${{ steps.bump-react-redux-retro.outputs.version }}
          generate_release_notes: true

      - name: Publish redux-retro to npm
        if: steps.check-tags.outputs.redux-retro-exists == 'false'
        working-directory: packages/redux-retro
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish react-redux-retro to npm
        if: steps.check-tags.outputs.react-redux-retro-exists == 'false'
        working-directory: packages/react-redux-retro
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
